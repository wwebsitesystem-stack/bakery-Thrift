<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bakery Thrift | Curated Vintage</title>
    <style>
        /* 1. Base Styles & Animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { 
            background-color: #f5f3ef; 
            color: #1a1a1a; 
            font-family: 'Georgia', serif; 
            margin: 0; 
            animation: fadeIn 1.2s ease-out;
        }

        /* 2. Grain Texture Overlay (Analog feel) */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05; pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 80px 40px; }

        /* 3. Header & Navigation */
        header { border-bottom: 1px solid #1a1a1a; padding-bottom: 40px; margin-bottom: 60px; text-align: center; }
        h1 { font-size: 4rem; letter-spacing: -2px; font-weight: 400; margin: 0; }
        .sub-nav { 
            margin-top: 25px; 
            font-family: sans-serif; 
            font-size: 0.75rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
        }
        .sub-nav a { color: #1a1a1a; text-decoration: none; margin: 0 10px; }
        .sub-nav a:hover { text-decoration: underline; }

        /* 4. Product Grid */
        .collection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
        .product-card { background: #fff; padding: 15px; border: 1px solid #e0e0e0; transition: 0.4s; }
        .product-card:hover { border: 1px solid #1a1a1a; box-shadow: 10px 10px 0px #e0e0e0; }
        
        .img-wrap { overflow: hidden; height: 450px; background: #eee; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .product-card:hover img { transform: scale(1.05); }

        .details { margin-top: 20px; text-align: center; }
        .details h2 { font-size: 1rem; font-weight: normal; margin: 0; }
        .details p { font-size: 0.85rem; color: #666; margin: 10px 0; }

        /* 5. Minimalist Button */
        .btn { border: 1px solid #1a1a1a; padding: 12px 25px; display: inline-block; text-decoration: none; color: #1a1a1a; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }
        .btn:hover { background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bakery Thrift</h1>
            <div class="sub-nav">
                <a href="index.html">Collection</a> &bull; 
                <a href="about.html">About Owner</a> &bull; 
                <a href="credits.html">Nexus Web Solutions</a>
            </div>
        </header>

        <div id="grid" class="collection-grid"></div>
    </div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const grid = document.getElementById('grid');
        const snap = await getDocs(collection(db, "products"));
        
        snap.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="product-card">
                    <div class="img-wrap"><img src="${p.imageUrl}"></div>
                    <div class="details">
                        <h2>${p.title}</h2>
                        <p>$${p.price}</p>
                        <a href="${p.checkoutUrl}" class="btn">Add to Bag</a>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
