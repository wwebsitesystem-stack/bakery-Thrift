<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #030305; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; margin: 0; }
        #sidebar { width: 250px; border-right: 1px solid #333; padding: 20px; height: 100vh; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; width: 100%; }
        .product-card { border: 1px solid #333; padding: 15px; }
    </style>
</head>
<body>
    <div id="sidebar"><h3>CATEGORIES</h3></div>
    <div id="grid"></div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const grid = document.getElementById('grid');
        const querySnapshot = await getDocs(collection(db, "products"));
        
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.imageUrl}" width="100%">
                    <h3>${p.title}</h3>
                    <p>$${p.price}</p>
                </div>`;
        });
    </script>
</body>
</html>
