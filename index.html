<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #c0c0c0; color: #000; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .container { width: 800px; margin: 0 auto; background: #fff; border: 2px outset #fff; padding: 20px; }
        header { border-bottom: 3px double #000; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .item { border: 1px solid #000; padding: 10px; background: #eee; }
        .btn { background: #ccc; border: 2px outset #fff; padding: 5px 10px; cursor: pointer; text-decoration: none; color: #000; }
        .btn:active { border-style: inset; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>BAKERY THRIFT</h1><p>Classic finds, honest prices.</p></header>
        <div id="grid" class="grid"></div>
        <footer style="margin-top:20px; text-align:center;">
            <a href="about.html">About the Owner</a>
        </footer>
    </div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const grid = document.getElementById('grid');
        const querySnapshot = await getDocs(collection(db, "products"));
        
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="item">
                    <img src="${p.imageUrl}" width="100%">
                    <h3>${p.title}</h3>
                    <p>$${p.price}</p>
                    <a href="${p.checkoutUrl}" class="btn">CHECKOUT</a>
                </div>`;
        });
    </script>
</body>
</html>
