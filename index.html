<!DOCTYPE html>
<html>
<head>
    <style>
        /* Classic 90s Web palette: muted, clean, and high-contrast */
        body { background-color: #669999; color: #000; font-family: Verdana, sans-serif; margin: 0; padding: 20px; }
        
        /* Fixed-width 'brochure' container */
        .page-wrapper { width: 750px; margin: 0 auto; background-color: #ffffff; border: 4px solid #000; padding: 30px; }
        
        /* Header area */
        header { border-bottom: 2px solid #000; margin-bottom: 30px; padding-bottom: 10px; }
        h1 { margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Item grid with clean boxes */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .product-box { border: 1px solid #999; padding: 15px; background-color: #fcfcfc; }
        
        /* Polished 'classic' buttons */
        .buy-btn { display: inline-block; background-color: #000; color: #fff; padding: 8px 15px; text-decoration: none; font-weight: bold; border: 2px solid #000; }
        .buy-btn:hover { background-color: #444; }
        
        footer { margin-top: 40px; font-size: 0.8em; text-align: center; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <h1>Bakery Thrift</h1>
            <p>Quality Goods &mdash; Established 2026</p>
        </header>

        <div id="grid" class="shop-grid">
            <!-- Items loaded via JavaScript -->
        </div>

        <footer>
            <a href="about.html">About the Owner</a> | <a href="account.html">Order History</a>
        </footer>
    </div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const grid = document.getElementById('grid');
        const querySnapshot = await getDocs(collection(db, "products"));
        
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="product-box">
                    <img src="${p.imageUrl}" style="width:100%; border:1px solid #ccc;">
                    <h3 style="margin: 10px 0;">${p.title}</h3>
                    <p>Price: $${p.price}</p>
                    <a href="${p.checkoutUrl}" class="buy-btn" target="_blank">PURCHASE NOW</a>
                </div>`;
        });
    </script>
</body>
</html>
