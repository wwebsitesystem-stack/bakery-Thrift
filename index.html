<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Entrance Animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { 
            background-color: #fcfbf8; 
            color: #1a1a1a; 
            font-family: 'Times New Roman', serif; 
            margin: 0; 
            animation: fadeIn 1.5s ease-in; /* The magic touch */
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 100px 40px; }

        /* 2. Sophisticated Header */
        header { text-align: center; margin-bottom: 120px; }
        h1 { font-size: 5rem; font-weight: 300; letter-spacing: -2px; margin: 0; }
        nav { margin-top: 30px; font-family: 'Helvetica', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; }

        /* 3. Luxury Grid Layout */
        .collection-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 80px; 
        }
        
        .item { text-align: center; }
        .item img { 
            width: 100%; 
            height: 550px; 
            object-fit: cover; 
            transition: transform 0.6s ease; /* Subtle zoom on hover */
        }
        .item:hover img { transform: scale(1.02); }

        .item h2 { font-size: 1.1rem; font-weight: normal; margin: 25px 0 5px 0; }
        .item p { font-family: sans-serif; font-size: 0.8rem; color: #777; margin-bottom: 20px; }

        /* 4. Refined Button */
        .buy-btn { 
            display: inline-block; 
            border: 1px solid #1a1a1a; 
            padding: 12px 30px; 
            text-decoration: none; 
            color: #1a1a1a; 
            font-family: sans-serif; 
            font-size: 0.7rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .buy-btn:hover { background: #1a1a1a; color: #fcfbf8; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bakery Thrift</h1>
            <nav>Collection &bull; About &bull; Archive</nav>
        </header>

        <div id="grid" class="collection-grid"></div>
    </div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const grid = document.getElementById('grid');
        const querySnapshot = await getDocs(collection(db, "products"));
        
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="item">
                    <img src="${p.imageUrl}" alt="${p.title}">
                    <h2>${p.title}</h2>
                    <p>$${p.price}</p>
                    <a href="${p.checkoutUrl}" class="buy-btn">Inquire</a>
                </div>`;
        });
    </script>
</body>
</html>
