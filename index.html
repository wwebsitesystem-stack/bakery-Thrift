<!DOCTYPE html>
<html>
<head>
    <style>
        /* A slightly warmer, professional 90s off-white background */
        body { background-color: #f4f1ea; color: #1a1a1a; font-family: 'Times New Roman', serif; margin: 0; padding: 40px 20px; }
        
        .page-wrapper { width: 850px; margin: 0 auto; }
        
        /* Serif-heavy headers for that editorial 'magazine' look */
        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3em; font-weight: normal; font-style: italic; margin: 0; border-bottom: 2px solid #1a1a1a; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .product-box { background: #fff; padding: 20px; border: 1px solid #dcdcdc; box-shadow: 5px 5px 0px #e0e0e0; }
        
        /* Clean, bold purchase buttons */
        .buy-btn { display: block; width: 100%; text-align: center; background: #1a1a1a; color: #fff; padding: 12px 0; margin-top: 15px; text-decoration: none; font-family: Verdana, sans-serif; font-size: 0.9em; letter-spacing: 1px; }
        
        footer { margin-top: 60px; text-align: center; font-family: Verdana, sans-serif; font-size: 0.7em; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <h1>Bakery Thrift</h1>
            <p>CURATED VINTAGE &bull; EST. 2026</p>
        </header>

        <div id="grid" class="shop-grid"></div>

        <footer>
            <a href="about.html">About the Owner</a> | <a href="account.html">Order History</a>
        </footer>
    </div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const grid = document.getElementById('grid');
        const querySnapshot = await getDocs(collection(db, "products"));
        
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="product-box">
                    <img src="${p.imageUrl}" style="width:100%; aspect-ratio: 1/1; object-fit: cover;">
                    <h3 style="font-family: Verdana; font-size: 1.1em; margin: 15px 0 5px 0;">${p.title}</h3>
                    <p style="font-family: Verdana; font-size: 0.9em;">$${p.price}</p>
                    <a href="${p.checkoutUrl}" class="buy-btn" target="_blank">ADD TO BAG</a>
                </div>`;
        });
    </script>
</body>
</html>
