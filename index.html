<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bakery Thrift | Curated Vintage</title>
    <style>
        /* Modern Boutique Aesthetic */
        body { 
            background-color: #fcfbf8; /* Soft cream/paper texture */
            color: #2c2c2c; 
            font-family: 'Georgia', serif; 
            margin: 0; 
            padding: 60px 40px; 
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Typography */
        header { text-align: center; margin-bottom: 80px; }
        h1 { font-size: 3.5rem; font-weight: 300; letter-spacing: -1px; margin: 0; }
        nav { margin-top: 20px; font-family: 'Helvetica Neue', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Editorial Grid */
        .collection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 60px; 
        }
        .item { text-align: left; }
        .item img { 
            width: 100%; 
            height: 400px; 
            object-fit: cover; 
            filter: grayscale(10%) contrast(1.05); /* Subtle vintage warmth */
            margin-bottom: 20px;
        }
        
        /* Buttons - Minimalist */
        .buy-btn { 
            display: inline-block; 
            border: 1px solid #2c2c2c; 
            padding: 10px 25px; 
            text-decoration: none; 
            color: #2c2c2c; 
            font-family: sans-serif; 
            font-size: 0.75rem; 
            text-transform: uppercase;
        }
        .buy-btn:hover { background: #2c2c2c; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bakery Thrift</h1>
            <nav>Collection &bull; About &bull; Archive</nav>
        </header>

        <div id="grid" class="collection-grid">
            <!-- Products injected here via Firebase -->
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-init.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const grid = document.getElementById('grid');
        const querySnapshot = await getDocs(collection(db, "products"));
        
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="item">
                    <img src="${p.imageUrl}" alt="${p.title}">
                    <h2 style="font-size: 1.2rem; margin: 0;">${p.title}</h2>
                    <p style="margin: 5px 0 20px 0;">$${p.price}</p>
                    <a href="${p.checkoutUrl}" class="buy-btn">Inquire / Purchase</a>
                </div>`;
        });
    </script>
</body>
</html>
