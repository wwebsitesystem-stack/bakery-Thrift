<div class="container">
    <h2>ADD INVENTORY</h2>
    <form id="uploadForm">
        <label>Title:</label><br>
        <input type="text" id="title" required><br><br>
        
        <label>Price:</label><br>
        <input type="number" id="price" required><br><br>
        
        <label>Stripe Checkout URL:</label><br>
        <input type="url" id="checkoutUrl" placeholder="Paste Stripe link here" required><br><br>
        
        <label>Image:</label><br>
        <input type="file" id="image" required><br><br>
        
        <button type="submit" class="btn">DEPLOY PRODUCT</button>
    </form>
</div>

<script type="module">
    import { db, storage } from './firebase-init.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const file = document.getElementById('image').files[0];
        const storageRef = ref(storage, 'products/' + file.name);
        
        // Upload image
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        
        // Save product details to Firestore
        await addDoc(collection(db, "products"), {
            title: document.getElementById('title').value,
            price: document.getElementById('price').value,
            checkoutUrl: document.getElementById('checkoutUrl').value,
            imageUrl: url
        });
        
        alert('Product successfully added to the shop.');
        document.getElementById('uploadForm').reset();
    };
</script>
