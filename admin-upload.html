<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #f5f3ef; color: #1a1a1a; font-family: 'Georgia', serif; margin: 0; padding: 40px; }
        .container { max-width: 500px; margin: 0 auto; padding: 40px; border: 1px solid #1a1a1a; background: #fff; }
        h1 { font-size: 2rem; margin-bottom: 30px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="loginArea">
        <h1>Admin Access</h1>
        <input type="password" id="password" placeholder="Enter Admin Password">
        <button class="btn" onclick="checkAuth()">Sign In</button>
    </div>

    <div class="container hidden" id="uploadArea">
        <h1>Add Inventory</h1>
        <input type="text" id="title" placeholder="Product Title">
        <input type="number" id="price" placeholder="Price">
        <input type="url" id="sellAppUrl" placeholder="Sell.app Link">
        <input type="file" id="image">
        <button class="btn" onclick="uploadProduct()">Deploy Product</button>
    </div>

    <script type="module">
        import { db, storage } from './firebase-init.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

        window.checkAuth = () => {
            if (document.getElementById('password').value === "bakery_thrift") {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('uploadArea').classList.remove('hidden');
            } else { alert("Access Denied"); }
        };

        window.uploadProduct = async () => {
            const file = document.getElementById('image').files[0];
            const storageRef = ref(storage, 'products/' + file.name);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            
            await addDoc(collection(db, "products"), {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                checkoutUrl: document.getElementById('sellAppUrl').value,
                imageUrl: url
            });
            alert('Product Deployed.');
        };
    </script>
</body>
</html>
